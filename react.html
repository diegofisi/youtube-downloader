<!DOCTYPE html>
<html lang="es" class="dark" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // Pre-JS theme hint: avoids a theme flash before React mounts (same key as the vanilla app).
    try {
      if (localStorage.getItem('stash-theme') === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.dataset.theme = 'light';
      }
    } catch { /* default dark */ }
  </script>
  <style>
    /* Background before globals.css lands, per theme class. */
    html { background: #19191B; }
    html:not(.dark) { background: #F2F2F4; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src-react/main.tsx"></script>
</body>
</html>
